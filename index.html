<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OWND - Moving Canvas</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="site.js"></script>
</head>
<body>
  <main class="split-home">
    <site-header></site-header>
    <section class="home-intro">
      <h1 class="display">Not Just Luggage.<br>A Moving <span class="accent">Canvas.</span></h1>
      <p class="lead">Choose Your Mode.</p>
    </section>
    <section class="mode-grid">
      <article class="mode-card">
        <img src="assets/hero-light-suitcase.jpg" alt="OWND Canvas Light suitcase">
        <h2>Light Mode</h2>
        <p>Bright. Calm. Expressive.</p>
        <a class="btn primary" href="canvas-light/">Enter Light Mode</a>
      </article>
      <article class="mode-card dark-mode">
        <img src="assets/hero-dark-suitcase.jpg" alt="OWND Canvas Dark suitcase">
        <h2>Dark Mode</h2>
        <p>Bold. Sharp. Personal.</p>
        <a class="btn gold" href="canvas-dark/">Enter Dark Mode</a>
      </article>
    </section>
    <section class="home-cta">
      <a class="btn" href="create/">Create Your Canvas</a>
      <p class="drop-note">Drop 001 / 500 Pieces Only.</p>
    </section>
  </main>
</body>
</html>
